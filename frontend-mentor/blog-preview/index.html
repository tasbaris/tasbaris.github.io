<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Blog preview card</title>

  <style>
    :root {
      --yellow: hsl(47, 88%, 63%);
      --white: hsl(0, 0%, 100%);
      --gray-500: hsl(0, 0%, 42%);
      --gray-950: hsl(0, 0%, 7%);
    }

    .attribution {
      font-size: 11px;
      text-align: center;
    }

    .attribution a {
      color: hsl(228, 45%, 44%);
    }

    @font-face {
      font-family: "Figtree";
      src: url("./assets/fonts/Figtree-VariableFont_wght.ttf") format("woff2");
      font-weight: 500;
      font-style: normal;
    }

    @font-face {
      font-family: "Figtree";
      src: url("./assets/fonts/Figtree-VariableFont_wght.ttf") format("woff2");
      font-weight: 800;
      font-style: normal;
    }

    body {
      background-color: var(--yellow);
      font-family: "Figtree", sans-serif;
      font-weight: 500;
      line-height: 1.4;
      display: flex;
      align-items: center;
      margin: 0;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
    }

    .card {
      background-color: var(--white);
      width: 320px;
      border-radius: 26px;
      border: 1px solid var(--gray-950);
      box-shadow: 10px 10px 0px var(--gray-950);
      padding: 24px;
      margin: 50px auto;
    }

    .card-image {
      width: 100%;
      overflow: hidden;
      border-radius: 12px;
      margin: 0;
    }

    .card-image img {
      width: 100%;
      object-fit: contain;
      display: block;
    }

    @media screen and (max-width: 400px) {
      .card-image {
        width: 320px;
        height: 230px;
        overflow: hidden;
        border-radius: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .card-image img {
        transform: scale(1.2);
        object-fit: contain;
        display: block;
      }


    }

    p {
      font-size: 16px;
      color: var(--gray-500);
      margin: 0;
    }



    .card-tag .tag {
      display: inline-block;
      background-color: var(--yellow);
      color: var(--gray-950);
      font-weight: 800;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 14px;
      margin-top: 25px;
      margin-bottom: 10px;
    }

    .card-date p {
      font-size: 14px;
      color: var(--gray-950);
    }

    .card-title h2 {
      font-size: 22px;
      color: var(--gray-950);
      margin: 15px 0;
    }

    .card-title h2:hover {
      color: var(--yellow);
      cursor: pointer;
    }

    .card-author {
      display: flex;
      align-items: center;
      margin-top: 25px;
    }

    .author-image {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      margin-right: 15px;

      overflow: hidden;
    }

    .author-image img {
      width: 36px;
      display: inline-block;
    }

    .author-name p {
      font-weight: 800;
      color: var(--gray-950);
    }
  </style>
</head>

<body>



  <div class="card">
    <div class="card-image"><img src="./assets/images/illustration-article.svg" alt=""></div>
    <div class="card-tag">
      <p class="tag">Learning</p>
    </div>
    <div class="card-date">
      <p>Published 21 Dec 2023</p>
    </div>
    <div class="card-title">
      <h2>HTML & CSS foundations</h2>
    </div>
    <div class="card-description">
      <p>
        These languages are the backbone of every website, defining structure, content, and presentation.
      </p>
    </div>
    <div class="card-author">
      <div class="author-image"><img src="./assets/images/image-avatar.webp" alt=""></div>
      <div class="author-name">
        <p>Greg Hooper</p>
      </div>
    </div>
  </div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Baris Tas</a>.
  </div>
</body>

</html>
